name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  host-tests:
    name: Host Tests (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & run host tests
        run: make test

  lint:
    name: Clang-Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          set +e
          output=$(find components main -name '*.c' -o -name '*.h' | \
                     xargs clang-format-18 --dry-run 2>&1)
          echo "$output"
          if echo "$output" | grep -q "code should be clang-formatted"; then
            exit 1
          fi
